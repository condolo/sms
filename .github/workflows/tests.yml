name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --omit=dev && npm install --save-dev jest supertest

      - name: Run tests
        run: npm test -- --ci --coverage --coverageReporters=text-summary

      - name: Generate release certificate
        if: github.ref == 'refs/heads/main'
        run: node scripts/release-cert.js --stdout > release-cert.json || true

      - name: Upload release certificate artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-cert-${{ github.sha }}
          path: release-cert.json
          retention-days: 90

      - name: Print test summary
        if: always()
        run: |
          echo "## Test Suite" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed. See logs above for results." >> $GITHUB_STEP_SUMMARY
