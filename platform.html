<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Msingi — Platform Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/platform.css">
</head>
<body>

<!-- ══ LOCK SCREEN ═════════════════════════════════════════ -->
<div id="lock-screen" class="pa-lock-screen">
  <div class="pa-lock-card">
    <div class="pa-lock-icon"><i class="fas fa-shield-halved"></i></div>
    <h2>Platform Admin</h2>
    <p>This area is restricted to Msingi system administrators. Sign in with your platform credentials.</p>

    <div class="pa-lock-field">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="Admin username"
             autocomplete="username"
             onkeydown="if(event.key==='Enter') document.getElementById('login-password').focus()">
    </div>

    <div class="pa-lock-field">
      <label>Password</label>
      <div class="pa-key-wrap">
        <input type="password" id="login-password" placeholder="Admin password"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter') login()">
        <button class="pa-key-toggle" onclick="togglePasswordVis(this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button class="pa-lock-btn" id="login-btn" onclick="login()">
      <i class="fas fa-arrow-right-to-bracket"></i> Sign In
    </button>

    <div class="pa-lock-error" id="login-error" style="display:none"></div>
  </div>
</div>

<!-- ══ APP SHELL ════════════════════════════════════════════ -->
<div id="app-shell" class="pa-shell" style="display:none">

  <!-- Sidebar -->
  <aside class="pa-sidebar">
    <div class="pa-sidebar-brand">
      <h1>
        <div class="pa-brand-icon"><i class="fas fa-graduation-cap"></i></div>
        Msingi
      </h1>
      <p>Platform Admin</p>
    </div>

    <nav class="pa-nav">
      <button class="pa-nav-item active" onclick="showView('overview')" id="nav-overview">
        <i class="fas fa-chart-pie"></i> Overview
      </button>
      <button class="pa-nav-item" onclick="showView('pending')" id="nav-pending">
        <i class="fas fa-hourglass-half"></i> Pending
        <span class="pa-badge" id="pending-badge" style="display:none">0</span>
      </button>
      <button class="pa-nav-item" onclick="showView('schools')" id="nav-schools">
        <i class="fas fa-school"></i> All Schools
      </button>
      <button class="pa-nav-item" onclick="showView('organizations')" id="nav-organizations">
        <i class="fas fa-sitemap"></i> Organizations
      </button>
      <button class="pa-nav-item" onclick="showView('provision')" id="nav-provision">
        <i class="fas fa-plus-circle"></i> Provision School
      </button>
      <button class="pa-nav-item" onclick="showView('announcements')" id="nav-announcements">
        <i class="fas fa-bullhorn"></i> Announcements
      </button>
      <button class="pa-nav-item" onclick="showView('diagnostics')" id="nav-diagnostics">
        <i class="fas fa-stethoscope"></i> Diagnostics
      </button>
      <button class="pa-nav-item" onclick="showView('branding')" id="nav-branding">
        <i class="fas fa-paint-brush"></i> Branding & Settings
      </button>
      <button class="pa-nav-item" onclick="showView('landing')" id="nav-landing">
        <i class="fas fa-globe"></i> Landing Page CMS
      </button>
      <button class="pa-nav-item" onclick="showView('billing')" id="nav-billing">
        <i class="fas fa-file-invoice"></i> Billing Overview
      </button>
    </nav>

    <div class="pa-sidebar-footer">
      <button class="pa-logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="pa-main">
    <header class="pa-topbar">
      <h2 id="view-title">Overview</h2>
      <div class="pa-topbar-meta">
        <i class="fas fa-circle" style="color:#22c55e;font-size:7px"></i>
        Platform Admin · <span id="topbar-time"></span>
      </div>
    </header>

    <div class="pa-content" id="pa-content">
      <div class="pa-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading…</div>
    </div>
  </main>
</div>

<!-- ══ TOAST ═══════════════════════════════════════════════ -->
<div class="pa-toast-wrap" id="toast-wrap"></div>

<script>
/* ============================================================
   Msingi Platform Admin Dashboard
   ============================================================ */

let _currentView = 'overview';

/* ── Auth ───────────────────────────────────────────────── */
async function login() {
  const usernameEl = document.getElementById('login-username');
  const passwordEl = document.getElementById('login-password');
  const btn        = document.getElementById('login-btn');
  const err        = document.getElementById('login-error');

  const username = usernameEl.value.trim();
  const password = passwordEl.value;

  if (!username || !password) {
    err.textContent   = 'Please enter both username and password.';
    err.style.display = 'block';
    return;
  }

  btn.disabled  = true;
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Signing in…';
  err.style.display = 'none';

  try {
    const res  = await fetch('/api/platform/auth/login', {
      method:      'POST',
      credentials: 'include',
      headers:     { 'Content-Type': 'application/json' },
      body:        JSON.stringify({ username, password }),
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      passwordEl.value = '';   // clear sensitive field
      _showApp();
    } else if (res.status === 429) {
      _showErr(err, 'Too many failed attempts. Please wait 15 minutes before trying again.');
    } else {
      var msg = (data && data.error && data.error.message) || (data && typeof data.error === 'string' && data.error) || 'Invalid credentials.';
      _showErr(err, msg);
    }
  } catch (e) {
    _showErr(err, 'Could not reach the server. Please check your connection. (' + (e && e.message ? e.message : 'network error') + ')');
  }

  btn.disabled  = false;
  btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Sign In';
}

function _showApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app-shell').style.display   = 'flex';
  _updateClock();
  setInterval(_updateClock, 60000);
  showView('overview');
  api('GET', '/schools/pending').then(list => _updatePendingBadge(list.length)).catch(()=>{});
}

function _showLogin(message) {
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('app-shell').style.display   = 'none';
  document.getElementById('login-username').value      = '';
  document.getElementById('login-password').value      = '';
  if (message) {
    const err = document.getElementById('login-error');
    err.textContent   = message;
    err.style.display = 'block';
  }
}

function _updateClock() {
  document.getElementById('topbar-time').textContent =
    new Date().toLocaleString('en-GB', { dateStyle:'medium', timeStyle:'short' });
}

async function logout() {
  try { await fetch('/api/platform/auth/logout', { method: 'POST', credentials: 'include' }); } catch (e) {}
  _showLogin();
}

function _showErr(el, msg) {
  el.textContent   = msg;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function togglePasswordVis(btn) {
  const inp  = document.getElementById('login-password');
  const show = inp.type === 'text';
  inp.type = show ? 'password' : 'text';
  btn.querySelector('i').className = show ? 'fas fa-eye' : 'fas fa-eye-slash';
}

/* ── API helpers ────────────────────────────────────────── */
async function api(method, path, body) {
  const opts = {
    method,
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch('/api/platform' + path, opts);
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) {
    _showLogin('Your session has expired. Please sign in again.');
    throw new Error('PLATFORM_SESSION_EXPIRED');
  }
  if (!res.ok) throw new Error(data?.error?.message || data?.error || `HTTP ${res.status}`);
  return data;
}

/* Fetch wrapper for full-path calls — session cookie is sent automatically */
async function apiFetch(url, opts = {}) {
  opts.credentials = 'include';
  opts.headers     = opts.headers || {};
  return fetch(url, opts);
}

/* ── Navigation ─────────────────────────────────────────── */
function showView(view) {
  _currentView = view;
  document.querySelectorAll('.pa-nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + view)?.classList.add('active');

  const titles = { overview:'Overview', pending:'Pending Approvals', schools:'Registered Schools', organizations:'Organizations', provision:'Provision New School', announcements:'System Announcements', diagnostics:'System Diagnostics', branding:'Branding & Platform Settings', landing:'Landing Page CMS', billing:'Billing Overview' };
  document.getElementById('view-title').textContent = titles[view] || view;

  const views = { overview: renderOverview, pending: renderPending, schools: renderSchools, organizations: renderOrganizations, provision: renderProvision, announcements: renderAnnouncements, diagnostics: renderDiagnostics, branding: renderBranding, landing: renderLandingCMS, billing: renderBillingOverview };
  (views[view] || (() => {}))();
}

/* ── OVERVIEW ───────────────────────────────────────────── */
async function renderOverview() {
  const el = document.getElementById('pa-content');
  el.innerHTML = '<div class="pa-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading stats…</div>';

  try {
    const stats = await api('GET', '/stats');
    // Per-student per-term rates (source of truth: server/config/pricing.js)
    const STUDENT_RATE = { base: 250, student: 300, family: 350 };
    // Canonical plan labels — Base (staff only), Student (+student portal), Family (+parent portal)
    const PLAN_META = {
      base:       { label: 'Base',       desc: 'KSh 250 / student / term', sub: 'Staff portals only' },
      student:    { label: 'Student',    desc: 'KSh 300 / student / term', sub: '+ Student portal' },
      family:     { label: 'Family',     desc: 'KSh 350 / student / term', sub: '+ Parent portal' },
      enterprise: { label: 'Enterprise', desc: 'Custom rate',              sub: 'API / SSO / white-label' },
    };

    el.innerHTML = `
      <div class="pa-stats">
        <div class="pa-stat-card">
          <div class="pa-stat-label">Total Schools</div>
          <div class="pa-stat-value">${stats.totalSchools}</div>
          <div class="pa-stat-sub">${stats.activeSchools} active</div>
        </div>
        <div class="pa-stat-card">
          <div class="pa-stat-label">Total Students</div>
          <div class="pa-stat-value">${(stats.totalStudents||0).toLocaleString()}</div>
          <div class="pa-stat-sub">across all schools</div>
        </div>
        <div class="pa-stat-card">
          <div class="pa-stat-label">Est. Monthly Revenue</div>
          <div class="pa-stat-value">KES ${((stats.mrr||0)/1000).toFixed(0)}K</div>
          <div class="pa-stat-sub">from billing snapshots</div>
        </div>
        <div class="pa-stat-card">
          <div class="pa-stat-label">Annual Run Rate</div>
          <div class="pa-stat-value">KES ${(((stats.mrr||0)*12)/1000000).toFixed(1)}M</div>
          <div class="pa-stat-sub">ARR projection</div>
        </div>
      </div>

      <div class="pa-card">
        <div class="pa-card-header"><h3>Plan Breakdown</h3></div>
        <div class="mrr-grid">
          ${['base','student','family','enterprise'].map(plan => {
            const count = (stats.byPlan||{})[plan] || 0;
            const meta  = PLAN_META[plan];
            return `
              <div class="mrr-item">
                <div class="mrr-item-count">${count}</div>
                <div class="mrr-item-plan">${meta.label}</div>
                <div class="mrr-item-rev">${meta.desc}</div>
                <div style="font-size:10px;color:var(--gray-400);margin-top:2px">${meta.sub}</div>
              </div>`;
          }).join('')}
        </div>
      </div>`;

  } catch (err) {
    el.innerHTML = _offlineStatsHTML();
    toast('Could not reach server — showing demo data', 'info');
  }
}

function _offlineStatsHTML() {
  return `
    <div class="pa-stats">
      <div class="pa-stat-card">
        <div class="pa-stat-label">Total Schools</div>
        <div class="pa-stat-value">1</div>
        <div class="pa-stat-sub">1 active (offline mode)</div>
      </div>
      <div class="pa-stat-card">
        <div class="pa-stat-label">Total Students</div>
        <div class="pa-stat-value">20</div>
        <div class="pa-stat-sub">Msingi demo school</div>
      </div>
      <div class="pa-stat-card">
        <div class="pa-stat-label">Monthly Revenue</div>
        <div class="pa-stat-value">KES 35K</div>
        <div class="pa-stat-sub">1 × Student plan</div>
      </div>
      <div class="pa-stat-card">
        <div class="pa-stat-label">Annual Run Rate</div>
        <div class="pa-stat-value">KES 0.4M</div>
        <div class="pa-stat-sub">ARR projection</div>
      </div>
    </div>
    <div class="pa-card">
      <div class="pa-card-header"><h3>Server Status</h3></div>
      <div style="padding:20px;font-size:13px;color:var(--gray-500)">
        <i class="fas fa-triangle-exclamation" style="color:#f59e0b;margin-right:8px"></i>
        Running in offline mode. Connect MongoDB and set PLATFORM_ADMIN_KEY in Render to see live data.
        <br><br>
        <a href="/api/health" target="_blank" style="color:var(--primary)">Check server health →</a>
      </div>
    </div>`;
}

/* ── PENDING APPROVALS ──────────────────────────────────── */
async function renderPending() {
  const el = document.getElementById('pa-content');
  el.innerHTML = '<div class="pa-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading pending schools…</div>';

  try {
    const schools = await api('GET', '/schools/pending');
    _updatePendingBadge(schools.length);

    if (!schools.length) {
      el.innerHTML = `
        <div class="pa-card">
          <div class="pa-empty">
            <i class="fas fa-check-circle" style="color:#22c55e;font-size:36px;margin-bottom:12px"></i>
            <p style="font-weight:600;color:#374151">All clear!</p>
            <p style="color:#9ca3af;font-size:13px">No schools are awaiting approval right now.</p>
          </div>
        </div>`;
      return;
    }

    el.innerHTML = `
      <div class="pa-card">
        <div class="pa-card-header">
          <h3>Awaiting Approval (${schools.length})</h3>
          <button class="pa-btn" onclick="renderPending()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div class="pending-list">
          ${schools.map(s => _pendingCard(s)).join('')}
        </div>
      </div>`;
  } catch (err) {
    el.innerHTML = `
      <div class="pa-card">
        <div style="padding:20px;font-size:13px;color:var(--gray-500)">
          <i class="fas fa-triangle-exclamation" style="color:#f59e0b;margin-right:8px"></i>
          Cannot reach the server. Make sure the Express backend is running.
        </div>
      </div>`;
  }
}

function _pendingCard(s) {
  const reg = s.createdAt ? new Date(s.createdAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
  const curriculum = (s.curriculum || []).join(', ') || '—';
  const sections   = (s.sections   || []).join(', ') || '—';
  return `
    <div class="pending-card" id="pc-${s._id}">
      <div class="pending-card-top">
        <div class="pending-card-info">
          <h4>${s.name}</h4>
          <span class="pending-meta"><i class="fas fa-link"></i> ${s.slug || '—'}</span>
          <span class="pending-meta"><i class="fas fa-user"></i> ${s.adminName || '—'} · ${s.adminEmail || '—'}</span>
          <span class="pending-meta"><i class="fas fa-map-marker-alt"></i> ${s.city || '—'}, ${s.country || '—'}</span>
          <span class="pending-meta"><i class="fas fa-book"></i> ${curriculum}</span>
          <span class="pending-meta"><i class="fas fa-layer-group"></i> ${sections}</span>
        </div>
        <div class="pending-card-right">
          <span class="plan-pill ${s.plan || 'core'}">${s.plan || 'core'}</span>
          <span style="font-size:11px;color:var(--gray-400);display:block;margin-top:6px;text-align:center">${reg}</span>
        </div>
      </div>
      <div class="pending-card-actions">
        <button class="pa-btn success" onclick="approveSchool('${s._id}','${s.name.replace(/'/g,"\\'")}')">
          <i class="fas fa-check"></i> Approve
        </button>
        <button class="pa-btn danger" onclick="rejectSchool('${s._id}','${s.name.replace(/'/g,"\\'")}')">
          <i class="fas fa-times"></i> Reject
        </button>
        <button class="pa-btn" onclick="confirmImpersonate('${s._id}','${s.name.replace(/'/g,"\\'")}')">
          <i class="fas fa-eye"></i> Preview
        </button>
      </div>
    </div>`;
}

function _updatePendingBadge(count) {
  const badge = document.getElementById('pending-badge');
  if (!badge) return;
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline-flex';
  } else {
    badge.style.display = 'none';
  }
}

async function approveSchool(schoolId, schoolName) {
  showModal(
    `Approve ${schoolName}?`,
    `Approving <strong>${schoolName}</strong> will activate their account and send them a welcome email with login instructions.`,
    [
      { label:'Cancel',  cls:'pa-btn', action:'closeModal()' },
      { label:'✓ Approve', cls:'pa-btn success', action:`doApprove('${schoolId}')` }
    ]
  );
}

async function doApprove(schoolId) {
  closeModal();
  try {
    await api('POST', `/schools/${schoolId}/approve`);
    toast('School approved and welcome email sent!', 'success');
    renderPending();
    // Also refresh badge
    api('GET', '/schools/pending').then(list => _updatePendingBadge(list.length)).catch(()=>{});
  } catch (err) {
    toast('Approval failed: ' + err.message, 'error');
  }
}

function rejectSchool(schoolId, schoolName) {
  showModal(
    `Reject ${schoolName}?`,
    `<p style="margin-bottom:12px">Rejecting will notify the school admin by email. You can provide an optional reason:</p>
     <textarea id="reject-reason" placeholder="Optional reason for rejection…"
       style="width:100%;height:80px;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:13px;font-family:inherit;resize:vertical"></textarea>`,
    [
      { label:'Cancel', cls:'pa-btn', action:'closeModal()' },
      { label:'✗ Reject', cls:'pa-btn danger', action:`doReject('${schoolId}')` }
    ]
  );
}

async function doReject(schoolId) {
  const reason = document.getElementById('reject-reason')?.value.trim() || '';
  closeModal();
  try {
    await api('POST', `/schools/${schoolId}/reject`, { reason });
    toast('School rejected. Notification email sent.', 'info');
    renderPending();
    api('GET', '/schools/pending').then(list => _updatePendingBadge(list.length)).catch(()=>{});
  } catch (err) {
    toast('Rejection failed: ' + err.message, 'error');
  }
}

/* ── SCHOOLS ────────────────────────────────────────────── */
async function renderSchools() {
  const el = document.getElementById('pa-content');
  el.innerHTML = '<div class="pa-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading schools…</div>';

  try {
    const schools = await api('GET', '/schools');
    if (!schools.length) {
      el.innerHTML = `<div class="pa-card"><div class="pa-empty"><i class="fas fa-school"></i><p>No schools registered yet.</p></div></div>`;
      return;
    }
    _renderSchoolsTable(el, schools);
  } catch {
    el.innerHTML = `
      <div class="pa-card">
        <div class="pa-card-header"><h3>Registered Schools</h3></div>
        <div style="padding:20px;font-size:13px;color:var(--gray-500)">
          <i class="fas fa-triangle-exclamation" style="color:#f59e0b;margin-right:8px"></i>
          Cannot reach the server. Make sure the Express server is running and PLATFORM_ADMIN_KEY is set.
        </div>
      </div>`;
  }
}

function _renderSchoolsTable(el, schools) {
  el.innerHTML = `
    <div class="pa-card">
      <div class="pa-card-header">
        <h3>Registered Schools (${schools.length})</h3>
        <div style="display:flex;gap:8px">
          <button class="pa-btn" onclick="wipeAllSchools()"
            style="color:#dc2626;border-color:#fca5a5;font-size:12px">
            <i class="fas fa-fire"></i> Wipe All
          </button>
          <button class="pa-btn primary" onclick="showView('provision')">
            <i class="fas fa-plus"></i> Add School
          </button>
        </div>
      </div>
      <div class="pa-table-wrap">
        <table class="pa-table">
          <thead>
            <tr>
              <th>School</th>
              <th>Slug</th>
              <th>Plan</th>
              <th>Status</th>
              <th>Students</th>
              <th>Staff</th>
              <th>Trial Ends</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${schools.map(s => _schoolRow(s)).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function _schoolRow(s) {
  const trial = s.trialEnds ? new Date(s.trialEnds) : null;
  const trialStr = trial
    ? (trial < new Date() ? '<span style="color:#ef4444">Expired</span>' : trial.toLocaleDateString('en-GB'))
    : '—';
  const status = !s.isActive ? 'inactive' : (trial && trial > new Date() ? 'trial' : 'active');
  const statusLabel = !s.isActive ? 'Suspended' : (status === 'trial' ? 'Trial' : 'Active');

  return `
    <tr>
      <td>
        <strong style="display:block;font-size:13px;color:var(--gray-900)">${s.name}</strong>
        <span style="font-size:11px;color:var(--gray-400)">${s.email||''}</span>
      </td>
      <td><code style="font-size:12px;background:var(--gray-100);padding:2px 6px;border-radius:4px">${s.slug||'—'}</code></td>
      <td><span class="plan-pill ${s.plan||'core'}">${s.plan||'core'}</span></td>
      <td><span class="status-dot ${status}">${statusLabel}</span></td>
      <td>${s._stats?.students ?? '—'}</td>
      <td>${s._stats?.staff   ?? '—'}</td>
      <td>${trialStr}</td>
      <td>
        <div class="pa-action-wrap">
          <button class="pa-btn" title="Log in as admin" onclick="confirmImpersonate('${s._id}','${s.name}')">
            <i class="fas fa-user-secret"></i> Log in
          </button>
          <button class="pa-btn" title="Change plan" onclick="changePlan('${s._id}','${s.plan}','${s.name}')">
            <i class="fas fa-layer-group"></i> Plan
          </button>
          <button class="pa-btn" title="Grant/revoke capabilities independent of plan tier" onclick="showEntitlements('${s._id}','${s.name.replace(/'/g,"\\'")}')">
            <i class="fas fa-unlock-alt"></i> Entitlements
          </button>
          ${s.isActive
            ? `<button class="pa-btn danger" title="Suspend school" onclick="toggleActive('${s._id}',false,'${s.name}')"><i class="fas fa-ban"></i></button>`
            : `<button class="pa-btn success" title="Reinstate school" onclick="toggleActive('${s._id}',true,'${s.name}')"><i class="fas fa-check"></i></button>`
          }
          <button class="pa-btn" title="Delete school permanently"
            style="color:#dc2626;border-color:#fca5a5"
            onclick="deleteSchool('${s._id}','${s.name.replace(/'/g,"\\'")}')">
            <i class="fas fa-trash-alt"></i>
          </button>
        </div>
      </td>
    </tr>`;
}

/* ── ORGANIZATIONS ──────────────────────────────────────── */
let _orgsCache = [];

async function renderOrganizations() {
  const el = document.getElementById('pa-content');
  el.innerHTML = '<div class="pa-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading organizations…</div>';

  try {
    const json = await api('GET', '/organizations');
    const orgs = json.organizations || [];
    _orgsCache = orgs;

    if (!orgs.length) {
      el.innerHTML = `<div class="pa-card"><div class="pa-empty"><i class="fas fa-sitemap"></i><p>No organizations yet.</p></div></div>`;
      return;
    }

    const totalSchools    = orgs.reduce((sum, o) => sum + o._stats.schoolCount, 0);
    const multiSchoolOrgs = orgs.filter(o => o._stats.schoolCount > 1).length;

    el.innerHTML = `
      <div class="pa-stats" style="margin-bottom:20px">
        <div class="pa-stat-card">
          <div class="pa-stat-label">Total Organizations</div>
          <div class="pa-stat-value">${orgs.length}</div>
          <div class="pa-stat-sub">${totalSchools} school(s) total</div>
        </div>
        <div class="pa-stat-card">
          <div class="pa-stat-label">Multi-School Orgs</div>
          <div class="pa-stat-value">${multiSchoolOrgs}</div>
          <div class="pa-stat-sub">with 2+ schools</div>
        </div>
        <div class="pa-stat-card">
          <div class="pa-stat-label">Unlinked Schools</div>
          <div class="pa-stat-value" style="${json.unlinkedSchools ? 'color:#f59e0b' : ''}">${json.unlinkedSchools || 0}</div>
          <div class="pa-stat-sub">missing an organization</div>
        </div>
      </div>

      <div class="pa-card">
        <div class="pa-card-header">
          <h3>Organizations (${orgs.length})</h3>
          <button class="pa-btn primary" onclick="showCreateOrganization()">
            <i class="fas fa-plus"></i> Create Organization
          </button>
        </div>
        <div class="pa-table-wrap">
          <table class="pa-table">
            <thead>
              <tr>
                <th>Organization</th>
                <th>Slug</th>
                <th>Shared Portal URL</th>
                <th>Schools</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${orgs.map(o => _orgRow(o)).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch (err) {
    el.innerHTML = `<div class="pa-error">Failed to load organizations: ${err.message}</div>`;
  }
}

function _orgRow(o) {
  const created = o.createdAt ? new Date(o.createdAt).toLocaleDateString('en-GB') : '—';
  const names   = o.schools.map(s => s.name).join(', ') || '—';
  const namesShort = names.length > 40 ? names.slice(0, 40) + '…' : names;
  const portalCell = o.multiSchoolEnabled
    ? `<code style="font-size:11px;background:var(--gray-100);padding:2px 6px;border-radius:4px">${o.slug}.msingi.io</code>${o.orgSlugLoginEnabled ? ' <span title="Org-slug login enabled (still requires platform-wide identity cutover to be functionally live)" style="color:#22c55e;font-size:11px"><i class="fas fa-circle"></i></span>' : ''}`
    : `<span style="color:var(--gray-400);font-size:12px">— (multi-school off)</span>`;
  return `
    <tr>
      <td><strong style="font-size:13px;color:var(--gray-900)">${o.name}</strong></td>
      <td><code style="font-size:12px;background:var(--gray-100);padding:2px 6px;border-radius:4px">${o.slug||'—'}</code></td>
      <td>${portalCell}</td>
      <td>${o._stats.schoolCount} <span style="color:var(--gray-400);font-size:12px">(${namesShort})</span></td>
      <td><span class="status-dot ${o.status === 'active' ? 'active' : ''}">${o.status || '—'}</span></td>
      <td style="color:var(--gray-400);font-size:12px">${created}</td>
      <td>
        <button class="pa-btn" title="View member schools" onclick="viewOrgSchools('${o.id}')">
          <i class="fas fa-eye"></i> View Schools
        </button>
        <button class="pa-btn" title="Multi-school & shared-slug-login settings" onclick="showOrgActivation('${o.id}')">
          <i class="fas fa-sliders-h"></i> Multi-School
        </button>
      </td>
    </tr>`;
}

/* Multi-school / org-slug-login activation modal (org-shared-slug
   feature, Phase 1). Two independent toggles, deliberately not folded
   into one switch — see platform.js's route-header comment for why.
   Re-renders itself after each toggle call (rather than closing) so an
   admin can see the resulting state and, for enable-org-slug-login,
   the identity-migration readiness info returned by the API. */
function showOrgActivation(orgId) {
  const org = _orgsCache.find(o => o.id === orgId);
  if (!org) return;

  const multiOn = !!org.multiSchoolEnabled;
  const slugOn  = !!org.orgSlugLoginEnabled;

  showModal(
    `Multi-School Settings — ${org.name}`,
    `<div style="display:flex;flex-direction:column;gap:14px;text-align:left">
      <div style="padding:10px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;font-size:12px;color:#1e40af">
        Two independent switches. Enabling multi-school alone only activates JWT enrichment and the school switcher for already-authenticated staff — it does <strong>not</strong> open a public login page. Org-slug login additionally requires this organization's slug (<code>${org.slug}.msingi.io</code>) to be reachable <em>and</em> the platform-wide <code>IDENTITY_CUTOVER_ENABLED</code> environment variable to be set — a global, operator-only lever this dashboard cannot flip or verify.
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid #e5e7eb;border-radius:6px">
        <div>
          <div style="font-size:13px;font-weight:600;color:#111827">Multi-School Mode</div>
          <div style="font-size:11px;color:#94a3b8">JWT orgId/membershipId + school switcher (C9)</div>
        </div>
        ${multiOn
          ? `<button class="pa-btn" style="padding:4px 10px;font-size:12px;color:#b91c1c" onclick="doDisableMultiSchool('${org.id}')"><i class="fas fa-toggle-on"></i> Disable</button>`
          : `<button class="pa-btn primary" style="padding:4px 10px;font-size:12px" onclick="doEnableMultiSchool('${org.id}')"><i class="fas fa-toggle-off"></i> Enable</button>`}
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid #e5e7eb;border-radius:6px;${multiOn ? '' : 'opacity:0.5'}">
        <div>
          <div style="font-size:13px;font-weight:600;color:#111827">Org-Slug Login Surface</div>
          <div style="font-size:11px;color:#94a3b8">${multiOn ? 'Requires multi-school mode (satisfied)' : 'Requires multi-school mode — enable that first'}</div>
        </div>
        ${!multiOn
          ? `<button class="pa-btn" style="padding:4px 10px;font-size:12px" disabled>Enable</button>`
          : slugOn
            ? `<button class="pa-btn" style="padding:4px 10px;font-size:12px;color:#b91c1c" onclick="doDisableOrgSlugLogin('${org.id}')"><i class="fas fa-toggle-on"></i> Disable</button>`
            : `<button class="pa-btn primary" style="padding:4px 10px;font-size:12px" onclick="doEnableOrgSlugLogin('${org.id}')"><i class="fas fa-toggle-off"></i> Enable</button>`}
      </div>

      <div id="org-activation-status" style="font-size:11px;color:#94a3b8"></div>
    </div>`,
    [{ label: 'Close', cls: 'pa-btn', action: 'closeModal(); renderOrganizations();' }]
  );
}

function _updateOrgCache(orgId, patch) {
  const idx = _orgsCache.findIndex(o => o.id === orgId);
  if (idx >= 0) Object.assign(_orgsCache[idx], patch);
}

async function doEnableMultiSchool(orgId) {
  try {
    const json = await api('POST', `/organizations/${orgId}/enable-multi-school`, {});
    _updateOrgCache(orgId, { multiSchoolEnabled: true });
    toast(json.note || 'Multi-school mode enabled.', 'success');
    showOrgActivation(orgId);
  } catch (err) { toast(err.message, 'error'); }
}

async function doDisableMultiSchool(orgId) {
  try {
    await api('POST', `/organizations/${orgId}/disable-multi-school`, {});
    _updateOrgCache(orgId, { multiSchoolEnabled: false, orgSlugLoginEnabled: false });
    toast('Multi-school mode disabled.', 'success');
    showOrgActivation(orgId);
  } catch (err) { toast(err.message, 'error'); }
}

async function doEnableOrgSlugLogin(orgId) {
  try {
    const json = await api('POST', `/organizations/${orgId}/enable-org-slug-login`, {});
    _updateOrgCache(orgId, { orgSlugLoginEnabled: true });
    toast(json.note || 'Org-slug login surface enabled.', 'success');
    showOrgActivation(orgId);
    const statusEl = document.getElementById('org-activation-status');
    if (statusEl && json.identityMigration) {
      const im = json.identityMigration;
      statusEl.textContent = `Identity cutover readiness: ${im.status} (${im.identityBackfillPending ?? 0} pending, ${im.collisionPending ?? 0} unresolved collisions).`;
    }
  } catch (err) { toast(err.message, 'error'); }
}

async function doDisableOrgSlugLogin(orgId) {
  try {
    await api('POST', `/organizations/${orgId}/disable-org-slug-login`, {});
    _updateOrgCache(orgId, { orgSlugLoginEnabled: false });
    toast('Org-slug login surface disabled.', 'success');
    showOrgActivation(orgId);
  } catch (err) { toast(err.message, 'error'); }
}

function viewOrgSchools(orgId) {
  const org = _orgsCache.find(o => o.id === orgId);
  if (!org) return;

  const rows = (org.schools || []).map(s => `
    <tr>
      <td style="padding:8px 10px;font-weight:600">${s.name}</td>
      <td style="padding:8px 10px"><span class="plan-pill ${s.plan||'core'}">${s.plan||'core'}</span></td>
      <td style="padding:8px 10px">${s.isActive ? '<span style="color:#22c55e">Active</span>' : '<span style="color:#ef4444">Inactive</span>'}</td>
      <td style="padding:8px 10px">
        <button class="pa-btn" style="padding:4px 10px;font-size:12px" title="Grant an existing person access to this school" onclick="showLinkIdentity('${s.id}', '${(s.name||'').replace(/'/g, "\\'")}')">
          <i class="fas fa-link"></i> Link Identity
        </button>
      </td>
    </tr>`).join('');

  showModal(
    `${org.name} — ${org._stats.schoolCount} school(s)`,
    `<table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="border-bottom:2px solid #e2e8f0">
          <th style="text-align:left;padding:8px 10px;color:#64748b;font-size:11px;text-transform:uppercase">School</th>
          <th style="text-align:left;padding:8px 10px;color:#64748b;font-size:11px;text-transform:uppercase">Plan</th>
          <th style="text-align:left;padding:8px 10px;color:#64748b;font-size:11px;text-transform:uppercase">Status</th>
          <th style="text-align:left;padding:8px 10px;color:#64748b;font-size:11px;text-transform:uppercase">Identity</th>
        </tr>
      </thead>
      <tbody>${rows || '<tr><td colspan="4" style="padding:12px;color:#94a3b8">No schools linked.</td></tr>'}</tbody>
    </table>`,
    [{ label: 'Close', cls: 'pa-btn', action: 'closeModal()' }]
  );
}

/* Search-and-confirm modal for granting an existing person access to a
   second school under the SAME organization. Record-only on the backend
   (POST /memberships) — the success toast echoes the API's `note` field
   verbatim so the limitation (doesn't enable login yet) is visible in
   the moment, not just documented in a comment. */
function showLinkIdentity(schoolId, schoolName) {
  showModal(
    `Link Identity — ${schoolName}`,
    `<div style="display:flex;flex-direction:column;gap:12px;text-align:left">
      <p style="font-size:12px;color:#64748b;margin:0">
        Search for an existing person by email, then grant them access to <strong>${schoolName}</strong>.
        This only links people already registered under the same organization — it does not create a new account,
        and it does not by itself let them log into this school yet.
      </p>
      <div style="display:flex;gap:8px">
        <input id="li-email" class="pa-input" placeholder="Search by email…" style="flex:1" onkeydown="if(event.key==='Enter'){searchLinkIdentity('${schoolId}')}">
        <button class="pa-btn" onclick="searchLinkIdentity('${schoolId}')"><i class="fas fa-search"></i> Search</button>
      </div>
      <div id="li-results" style="min-height:20px"></div>
      <div id="li-error" style="display:none;padding:8px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;font-size:12px;color:#b91c1c"></div>
    </div>`,
    [{ label: 'Close', cls: 'pa-btn', action: 'closeModal()' }]
  );
}

async function searchLinkIdentity(schoolId) {
  const email     = document.getElementById('li-email')?.value.trim();
  const resultsEl = document.getElementById('li-results');
  const errEl     = document.getElementById('li-error');
  errEl.style.display = 'none';

  if (!email || email.length < 3) {
    errEl.textContent = 'Type at least 3 characters of the email to search.';
    errEl.style.display = 'block';
    return;
  }

  resultsEl.innerHTML = '<div class="pa-loading"><i class="fas fa-circle-notch fa-spin"></i> Searching…</div>';
  try {
    const json  = await api('GET', `/users/search?email=${encodeURIComponent(email)}`);
    const users = json.users || [];

    if (!users.length) {
      resultsEl.innerHTML = '<p style="font-size:12px;color:#94a3b8;margin:0">No matching users found.</p>';
      return;
    }

    resultsEl.innerHTML = users.map(u => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:6px">
        <div>
          <div style="font-size:13px;font-weight:600;color:#111827">${u.name || u.email}</div>
          <div style="font-size:11px;color:#94a3b8">${u.email} · ${u.role || '—'} · ${u.schoolName || 'no current school'}</div>
        </div>
        <button class="pa-btn primary" style="padding:4px 10px;font-size:12px" onclick="grantLinkIdentity('${u.id}', '${schoolId}')">
          <i class="fas fa-link"></i> Grant Access
        </button>
      </div>`).join('');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
}

async function grantLinkIdentity(userId, schoolId) {
  const errEl = document.getElementById('li-error');
  errEl.style.display = 'none';
  try {
    const json = await api('POST', '/memberships', { userId, schoolId });
    closeModal();
    toast(json.note || 'Membership created.', 'success');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
}

function showCreateOrganization() {
  showModal(
    'Create Organization',
    `<div style="display:flex;flex-direction:column;gap:12px;text-align:left">
      <div>
        <label class="pa-label">Organization Name *</label>
        <input id="org-name" class="pa-input" placeholder="e.g. Green Valley Schools" style="width:100%">
      </div>
      <div>
        <label class="pa-label">URL Slug</label>
        <input id="org-slug" class="pa-input" placeholder="e.g. green-valley (auto-derived from name if left blank)" style="width:100%">
        <span style="font-size:11px;color:var(--gray-400)">Schools added to this organization will get slugs prefixed with it, e.g. <code>green-valley-eldoret</code>.</span>
      </div>
      <div id="org-create-error" style="display:none;padding:8px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;font-size:12px;color:#b91c1c"></div>
    </div>`,
    [
      { label: 'Cancel', cls: 'pa-btn', action: 'closeModal()' },
      { label: '+ Create', cls: 'pa-btn primary', action: 'doCreateOrganization()' }
    ]
  );
}

async function doCreateOrganization() {
  const name = document.getElementById('org-name')?.value.trim();
  const slug = document.getElementById('org-slug')?.value.trim();
  const errEl = document.getElementById('org-create-error');

  if (!name) {
    errEl.textContent = 'Organization name is required.';
    errEl.style.display = 'block';
    return;
  }

  try {
    await api('POST', '/organizations', { name, slug: slug || undefined });
    closeModal();
    toast(`Organization "${name}" created.`, 'success');
    renderOrganizations();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
}

async function runEmailTest() {
  const btn = document.getElementById('btn-test-email');
  const out = document.getElementById('email-test-result');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Sending…';
  out.style.display = 'none';

  try {
    const res  = await apiFetch('/api/platform/test-email');
    const data = await res.json();
    const ok   = data.success;
    out.style.display = 'block';
    out.innerHTML = `
      <div style="padding:12px 14px;border-radius:7px;font-size:13px;
        background:${ok?'#d1fae5':'#fee2e2'};border:1px solid ${ok?'#6ee7b7':'#fca5a5'};
        color:${ok?'#065f46':'#991b1b'}">
        ${data.message || (ok ? '✅ Email sent!' : '❌ Email failed')}
        ${data.config ? `<div style="margin-top:8px;font-size:11px;font-family:monospace;opacity:.8">
          SMTP_USER: ${data.config.SMTP_USER}<br>
          SMTP_PASS: ${data.config.SMTP_PASS}<br>
          APP_URL: ${data.config.APP_URL}
        </div>` : ''}
      </div>`;
  } catch (err) {
    out.style.display = 'block';
    out.innerHTML = `<div style="padding:12px;background:#fee2e2;border-radius:7px;font-size:13px;color:#991b1b">❌ ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Test Email';
  }
}

async function runDbCheck() {
  const out = document.getElementById('db-check-result');
  out.style.display = 'block';
  out.innerHTML = '<div style="font-size:13px;color:#6b7280">Checking…</div>';
  try {
    const res  = await apiFetch('/api/platform/stats');
    const data = await res.json();
    const ok   = typeof data.totalSchools === 'number';
    out.innerHTML = `<div style="padding:12px;border-radius:7px;font-size:13px;
      background:${ok?'#d1fae5':'#fee2e2'};border:1px solid ${ok?'#6ee7b7':'#fca5a5'};
      color:${ok?'#065f46':'#991b1b'}">
      ${ok ? `✅ MongoDB connected — ${data.totalSchools} school(s) in DB` : '❌ DB query failed: ' + JSON.stringify(data)}

  } catch (err) {

async function doImpersonate(schoolId) {
  closeModal();
  try {
    const data = await api('POST', `/schools/${schoolId}/impersonate`);

    // ── Wipe ALL legacy app keys so stale demo data never bleeds into the new school ──
    const LEGACY_KEYS = [
      'innolearn_students','innolearn_teachers','innolearn_classes','innolearn_subjects',
      'innolearn_events','innolearn_messages','innolearn_finance','innolearn_attendance',
      'innolearn_grades','innolearn_behaviour','innolearn_admissions','innolearn_timetable',
      'innolearn_users','innolearn_school','innolearn_academic_years','innolearn_sections',
      'ss_jwt','ss_session',
    ];
    LEGACY_KEYS.forEach(k => localStorage.removeItem(k));
    sessionStorage.clear();

    // ── Store session for the React SPA (key: msingi_session, used by auth store) ──
    // Token is NOT stored here — it lives in the HttpOnly cookie set by the server.
    // Normalise _id → id so isSessionActive() can read user.id.
    const u = data.user || {};
    const sessionPayload = {
      user:   { ...u, id: u.id || (u._id ? String(u._id) : undefined), password: undefined },
      school: {},
    };
    localStorage.setItem('msingi_session', JSON.stringify(sessionPayload));

    toast('Redirecting to school portal…', 'success');
    setTimeout(() => { window.location.href = '/login'; }, 800);
  } catch (err) {
    toast('Impersonation failed: ' + err.message, 'error');
  }
}

async function grantEntitlement(schoolId) {
  const key       = document.getElementById('ent-key')?.value.trim();
  const notes     = document.getElementById('ent-notes')?.value.trim();
  const expiresAt = document.getElementById('ent-expires')?.value;
  const errEl     = document.getElementById('ent-error');
  errEl.style.display = 'none';

  if (!key) {
    errEl.textContent = 'Key is required (e.g. ai_reports).';
    errEl.style.display = 'block';
    return;
  }

  try {
    const json = await api('POST', `/schools/${schoolId}/entitlements`, {
      key,
      notes:     notes || undefined,
      expiresAt: expiresAt ? new Date(expiresAt).toISOString() : undefined,
    });
    document.getElementById('ent-key').value     = '';
    document.getElementById('ent-notes').value    = '';
    document.getElementById('ent-expires').value  = '';
    toast(json.note || 'Entitlement granted.', 'success');
    loadEntitlements(schoolId);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
}

async function revokeEntitlement(schoolId, key) {
  try {
    await api('DELETE', `/schools/${schoolId}/entitlements/${key}`);
    toast(`Revoked "${key}".`, 'info');
    loadEntitlements(schoolId);

/* Shows "will become: {orgSlug}-{typed}" under the slug field when an
   existing organization is selected — the server derives the same value,
   this is just so the admin isn't surprised by the final slug. */
function _updateSlugHint() {
  const orgSel = document.getElementById('p-org');
  const hint   = document.getElementById('p-slug-hint');
  const slugEl = document.getElementById('p-slug');
  const opt    = orgSel?.selectedOptions?.[0];
  const orgSlug = opt?.value ? (opt.dataset.slug || '') : '';

  if (!orgSlug) { hint.style.display = 'none'; return; }

  const typed = (slugEl.value || '').trim().toLowerCase().replace(/[^a-z0-9-]/g, '');
  const suffix = '-' + orgSlug;
  const finalSlug = typed.endsWith(suffix) ? typed : typed + suffix;
  hint.textContent = `Will be created as: ${typed ? finalSlug : '…' + suffix}`;
  hint.style.display = 'block';
}

async function doProvision() {
  const g = id => document.getElementById(id)?.value.trim();
  const name = g('p-name'), slug = g('p-slug'), email = g('p-admin-email'), pw = g('p-admin-pw');
  const organizationId = g('p-org') || undefined;
  const errEl = document.getElementById('provision-error');
  errEl.style.display = 'none';

  if (!name || !slug || !email || !pw) {
    errEl.textContent = 'Please fill in all required fields.'; errEl.style.display = 'block'; return;
  }

  const btn = document.getElementById('provision-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Provisioning…';

  try {
    await api('POST', '/schools', {
      name, shortName: g('p-short'), slug,
      plan: g('p-plan'), currency: g('p-currency'), timezone: 'Africa/Nairobi',
      adminName: g('p-admin-name'), adminEmail: email, adminPassword: pw,
      organizationId
    });
    toast(`${name} provisioned successfully!`, 'success');
    showView('schools');
  } catch (err) {
    errEl.textContent = err.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-plus-circle"></i> Provision School';
  }
}

            </div>
            <div style="display:flex;gap:8px;flex-shrink:0">
              ${ann.status === 'active' ? `
              <button class="pa-btn" onclick="cancelAnnouncement('${ann._id}')" title="Cancel announcement"
                style="padding:6px 14px;font-size:12px">Cancel</button>` : `
              <button class="pa-btn success" onclick="reactivateAnnouncement('${ann._id}')" title="Reactivate"
                style="padding:6px 14px;font-size:12px">Reactivate</button>`}
              <button class="pa-btn" onclick="deleteAnnouncement('${ann._id}')"
                style="padding:6px 14px;font-size:12px;color:#dc2626;border-color:#fca5a5">Delete</button>
            </div>
          </div>
        </div>`).join('')}
    `;
  } catch (err) {
    el.innerHTML = `<div class="pa-error">Failed to load announcements: ${err.message}</div>`;
  }
}

async function submitAnnouncement() {
  const title   = document.getElementById('ann-title')?.value.trim();
  const desc    = document.getElementById('ann-desc')?.value.trim();
  const type    = document.getElementById('ann-type')?.value;
  const sched   = document.getElementById('ann-scheduled')?.value;
  const expires = document.getElementById('ann-expires')?.value;
  const notify  = document.getElementById('ann-notify')?.checked;
  const errEl   = document.getElementById('ann-error');

  if (!title || !desc) { errEl.textContent = 'Title and description are required.'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';

  try {
    const res = await apiFetch('/api/platform/announcements', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description: desc, type, scheduledAt: sched || null, expiresAt: expires || null, notifyAll: notify })
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); errEl.textContent = (typeof e.error === 'string' ? e.error : e.error?.message) || 'Request failed'; errEl.style.display='block'; return; }
    closeModal();
    toast(`Announcement created${notify ? ' — emails sent to all schools' : ''}.`, 'success');
    renderAnnouncements();
  } catch (err) {
    errEl.textContent = err.message || 'Unexpected error'; errEl.style.display='block';
  }
}

async function cancelAnnouncement(id) {
  await apiFetch(`/api/platform/announcements/${id}`, {
    method: 'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ status: 'cancelled' })
  });
  renderAnnouncements();
}

async function reactivateAnnouncement(id) {
  await apiFetch(`/api/platform/announcements/${id}`, {
    method: 'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ status: 'active' })
  });
  renderAnnouncements();
}

async function deleteAnnouncement(id) {
  showModal('Delete Announcement', '<p>This will permanently delete the announcement from all dashboards. Cannot be undone.</p>', [
    { label:'Cancel', action:'closeModal()' },
    { label:'Delete', action:`_doDeleteAnn('${id}')`, primary:true, danger:true }
  ]);
}

async function _doDeleteAnn(id) {
  await apiFetch(`/api/platform/announcements/${id}`, { method: 'DELETE' });
  closeModal();
  showToast('Announcement deleted.', 'success');
  renderAnnouncements();
}

/* ── Modal ──────────────────────────────────────────────── */
function showModal(title, body, actions) {
  closeModal();
  const bg = document.createElement('div');
  bg.className = 'pa-modal-bg';
  bg.id = 'pa-modal-bg';
  bg.innerHTML = `
    <div class="pa-modal">
      <h3>${title}</h3>
      <p>${body}</p>
      <div class="pa-modal-actions">
        ${actions.map(a => `<button class="${a.cls}" onclick="${a.action}">${a.label}</button>`).join('')}
      </div>
    </div>`;
  document.body.appendChild(bg);
}

function closeModal() {
  document.getElementById('pa-modal-bg')?.remove();
}

/* ── Toast ──────────────────────────────────────────────── */
function toast(msg, type = 'info') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `pa-toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

      linkedin:  document.getElementById('ps-linkedin').value,
      facebook:  document.getElementById('ps-facebook').value,
      instagram: document.getElementById('ps-instagram').value,
      youtube:   document.getElementById('ps-youtube').value,

  };

    const res = await api('PUT', '/settings', payload);

    msgEl.style.border = '1px solid #fecaca';
    msgEl.style.borderRadius = '8px';

}

/* ── CMS helpers ─────────────────────────────────────────── */
function _cmsSection(id, title, inner) {
  return `
    <div class="pa-card" id="cms-sec-${id}">
      <div class="pa-card-header" style="cursor:pointer;user-select:none" onclick="_toggleCmsSection('${id}')">
        <h3 style="margin:0;display:flex;align-items:center;gap:8px">
          <i class="fas fa-chevron-down" id="cms-chevron-${id}" style="font-size:11px;color:#94a3b8;transition:transform .2s"></i>
          ${title}
        </h3>
      </div>
      <div id="cms-body-${id}" style="padding:16px 0 0">
        ${inner}
      </div>
    </div>`;
}

function _toggleCmsSection(id) {
  const body = document.getElementById('cms-body-' + id);
  const icon = document.getElementById('cms-chevron-' + id);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  icon.style.transform = open ? 'rotate(-90deg)' : 'rotate(0)';
}

function _cmsVal(path, def = '') {
  const parts = path.split('.');
  let cur = _cmsData;
  for (const p of parts) { if (cur == null) return def; cur = cur[p]; }
  return (cur !== undefined && cur !== null) ? String(cur).replace(/"/g,'&quot;') : def;
}

function _v(id) {
  const el = document.getElementById(id);
  return el ? (el.tagName === 'TEXTAREA' ? el.value : el.value) : '';
}

function _convictionRows() {
  const pairs = _cmsData.conviction || [
    { before: 'Fee tracking in Excel, reconciled every Friday', after: 'Real-time fee ledger — every payment, every receipt, live' },
    { before: 'Report cards assembled manually by the registrar', after: 'Governed publishing: Teacher → HOD → Principal → Portal' },
    { before: 'Curriculum coverage tracked in a teacher\'s notebook', after: 'Syllabus tracker — every topic marked, every subject covered live' },
    { before: 'Parent notices via personal WhatsApp groups', after: 'Structured institutional channels with full audit trail' },
    { before: 'Leadership decisions on week-old paper summaries', after: 'Live director dashboard across attendance, grades, and finance' },
  ];
  return pairs.map((p, i) => `
    <div class="cms-conv-row" data-index="${i}" style="display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;align-items:center">
      <input class="cms-conv-before" type="text" placeholder="Before (old pain)" value="${(p.before||'').replace(/"/g,'&quot;')}" />
      <input class="cms-conv-after"  type="text" placeholder="After (Msingi solution)" value="${(p.after||'').replace(/"/g,'&quot;')}" />
      <button onclick="this.closest('.cms-conv-row').remove()" style="background:#fee2e2;border:none;border-radius:6px;color:#dc2626;cursor:pointer;padding:6px">
        <i class="fas fa-trash"></i>
      </button>
    </div>`).join('');
}

function _addConvictionRow() {
  const container = document.getElementById('cms-conviction-rows');
  const idx = container.children.length;
  const div = document.createElement('div');
  div.className = 'cms-conv-row';
  div.dataset.index = idx;
  div.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;align-items:center';
  div.innerHTML = `
    <input class="cms-conv-before" type="text" placeholder="Before (old pain)" />
    <input class="cms-conv-after"  type="text" placeholder="After (Msingi solution)" />
    <button onclick="this.closest('.cms-conv-row').remove()" style="background:#fee2e2;border:none;border-radius:6px;color:#dc2626;cursor:pointer;padding:6px">
      <i class="fas fa-trash"></i>
    </button>`;
  container.appendChild(div);
}

function _saveConviction() {
  const rows  = document.querySelectorAll('.cms-conv-row');
  const pairs = [];
  rows.forEach(row => {
    const before = row.querySelector('.cms-conv-before')?.value?.trim();
    const after  = row.querySelector('.cms-conv-after')?.value?.trim();
    if (before || after) pairs.push({ before: before || '', after: after || '' });
  });
  _saveCmsSection('conviction', pairs);
}

const ALL_ECO_NODES = ['Admissions','Student Records','Classes','Timetable','Attendance','Lessons','Grades','Behaviour','Reports','Finance','Library','Transport','Hostel','Analytics'];

function _ecoNodeToggles() {
  const enabled = _cmsData.ecosystem?.enabledNodes || ALL_ECO_NODES;
  return ALL_ECO_NODES.map(label => {
    const on = enabled.includes(label);
    return `<label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;background:${on?'#eef2ff':'#f8fafc'};border:1px solid ${on?'#c7d2fe':'#e2e8f0'};padding:4px 10px;border-radius:20px">
      <input type="checkbox" data-node="${label}" ${on?'checked':''} style="cursor:pointer"> ${label}
    </label>`;
  }).join('');
}

function _saveEcosystem() {
  const heading    = _v('cms-eco-heading');
  const subheading = _v('cms-eco-subheading');
  const nodeDescs  = {};
  const enabledNodes = [];
  document.querySelectorAll('#cms-eco-nodes input[data-node]').forEach(cb => {
    if (cb.checked) enabledNodes.push(cb.dataset.node);
  });
  _saveCmsSection('ecosystem', { heading, subheading, enabledNodes, nodeDescs });
}

async function _saveCmsSection(section, data) {
  try {
    const res  = await fetch('/api/platform/landing-content', {
      method:      'PUT',
      credentials: 'include',
      headers:     { 'Content-Type': 'application/json' },
      body:        JSON.stringify({ section, data }),
    });
    const json = await res.json();
    if (json.success) {
      toast('✓ ' + section + ' saved successfully', 'success');
      // Update local cache
      if (!_cmsData) _cmsData = {};
      _cmsData[section] = data;
    } else {
      toast('Failed: ' + (json.error || 'Unknown error'), 'error');
    }
  } catch (err) {
    toast('Save failed: ' + err.message, 'error');
  }
}

function _injectCmsStyles() {
  if (document.getElementById('cms-styles')) return;
  const s = document.createElement('style');
  s.id = 'cms-styles';
  s.textContent = `
    .cms-field { display:flex;flex-direction:column;gap:4px; }
    .cms-field label { font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em; }
    .cms-field input, .cms-field textarea {
      border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;
      font-family:inherit;color:#1e293b;background:#fff;resize:vertical;
      transition:border-color .15s,box-shadow .15s;
    }
    .cms-field input:focus, .cms-field textarea:focus {
      outline:none;border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.1);
    }
  `;
  document.head.appendChild(s);
}

/* ══════════════════════════════════════════════════════════════
   BILLING OVERVIEW
   ══════════════════════════════════════════════════════════════ */
async function renderBillingOverview() {
  const el = document.getElementById('pa-content');
  el.innerHTML = '<div class="pa-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading billing data…</div>';

  try {
    const json = await api('GET', '/billing/all');

    const snapshots = json.data || [];
    const total     = snapshots.reduce((s, x) => s + (x.totalAmount || 0), 0);
    const paid      = snapshots.filter(x => x.status === 'paid').reduce((s, x) => s + (x.paidAmount || x.totalAmount || 0), 0);
    const pending   = snapshots.filter(x => x.status === 'pending');

    const STATUS_COLOR = { pending: '#f59e0b', paid: '#22c55e', overdue: '#ef4444' };

    el.innerHTML = `
      <div class="pa-stats" style="margin-bottom:20px">
        <div class="pa-stat-card">
          <div class="pa-stat-label">Total Invoiced</div>
          <div class="pa-stat-value">KSh ${(total/1000).toFixed(1)}K</div>
          <div class="pa-stat-sub">${snapshots.length} invoices</div>
        </div>
        <div class="pa-stat-card">
          <div class="pa-stat-label">Total Collected</div>
          <div class="pa-stat-value">KSh ${(paid/1000).toFixed(1)}K</div>
          <div class="pa-stat-sub">${snapshots.filter(x=>x.status==='paid').length} paid</div>
        </div>
        <div class="pa-stat-card">
          <div class="pa-stat-label">Outstanding</div>
          <div class="pa-stat-value" style="color:#f59e0b">KSh ${((total-paid)/1000).toFixed(1)}K</div>
          <div class="pa-stat-sub">${pending.length} pending</div>
        </div>
      </div>

      <div class="pa-card">
        <div class="pa-card-header"><h3>All Invoices</h3></div>
        ${snapshots.length === 0 ? '<p style="color:#94a3b8;padding:16px 0">No billing snapshots yet. Snapshots are created automatically on term start dates.</p>' : `
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr style="border-bottom:2px solid #e2e8f0">
              <th style="text-align:left;padding:8px 12px;color:#64748b;font-size:11px;text-transform:uppercase">School</th>
              <th style="text-align:left;padding:8px 12px;color:#64748b;font-size:11px;text-transform:uppercase">Invoice Ref</th>
              <th style="text-align:left;padding:8px 12px;color:#64748b;font-size:11px;text-transform:uppercase">Year / Term</th>
              <th style="text-align:right;padding:8px 12px;color:#64748b;font-size:11px;text-transform:uppercase">Students</th>
              <th style="text-align:right;padding:8px 12px;color:#64748b;font-size:11px;text-transform:uppercase">Amount</th>
              <th style="text-align:center;padding:8px 12px;color:#64748b;font-size:11px;text-transform:uppercase">Status</th>
              <th style="text-align:left;padding:8px 12px;color:#64748b;font-size:11px;text-transform:uppercase">Paid</th>
            </tr>
          </thead>
          <tbody>
            ${snapshots.map(s => `
              <tr style="border-bottom:1px solid #f1f5f9;hover:background:#f8fafc">
                <td style="padding:10px 12px;font-weight:600">${s.schoolName || s.schoolId}</td>
                <td style="padding:10px 12px;font-family:monospace;font-size:12px;color:#6366f1">${s.invoiceRef}</td>
                <td style="padding:10px 12px;color:#64748b">${s.academicYear} · T${s.term}</td>
                <td style="padding:10px 12px;text-align:right">${s.activeCount}</td>
                <td style="padding:10px 12px;text-align:right;font-weight:600">KSh ${(s.totalAmount||0).toLocaleString()}</td>
                <td style="padding:10px 12px;text-align:center">
                  <span style="background:${STATUS_COLOR[s.status]||'#94a3b8'}22;color:${STATUS_COLOR[s.status]||'#94a3b8'};padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:capitalize">${s.status}</span>
                </td>
                <td style="padding:10px 12px;color:#94a3b8;font-size:12px">${s.paidAt ? new Date(s.paidAt).toLocaleDateString('en-GB') : '—'}</td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>`;

  } catch (err) {
    el.innerHTML = `<div class="pa-error">Failed to load billing data: ${err.message}</div>`;
  }
}

/* ── Boot: silently restore session from HttpOnly cookie ── */
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const res = await fetch('/api/platform/stats', { credentials: 'include' });
    if (res.ok) { _showApp(); }
    // 401/403 → stay on login screen (default)
  } catch (e) {
    // Server unreachable — stay on login screen
  }
});
</script>
