services:
  - type: web
    name: msingi
    env: node
    plan: starter
    # build:ssg runs the normal Vite build, then a Puppeteer pass that
    # renders every public marketing route to static HTML in dist/<route>/.
    # Without this, AI/search crawlers that don't execute JS only ever see
    # the empty SPA shell — see client/scripts/prerender.mjs for details.
    buildCommand: npm install && cd client && npm install --legacy-peer-deps && npm run build:ssg
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard → Environment
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure value
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PLATFORM_ADMIN_KEY
        generateValue: true  # Your private platform admin API key
      - key: APP_URL
        value: https://msingi.io
      - key: SMTP_USER
        sync: false          # Set in Render dashboard: your Gmail address
      - key: SMTP_PASS
        sync: false          # Set in Render dashboard: Gmail App Password (16 chars)
      - key: PLATFORM_EMAIL
        sync: false          # Set in Render dashboard: email address for admin alerts
