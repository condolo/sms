services:
  - type: web
    name: InnoLearn
    env: node
    plan: starter
    buildCommand: npm install && cd client && npm install --include=dev && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard → Environment
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure value
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PLATFORM_ADMIN_KEY
        generateValue: true  # Your private platform admin API key
      - key: APP_URL
        value: https://school-management-ecosystem.onrender.com
      - key: SMTP_USER
        sync: false          # Set in Render dashboard: your Gmail address (e.g. yourapp@gmail.com)
      - key: SMTP_PASS
        sync: false          # Set in Render dashboard: Gmail App Password (16 chars, spaces OK)
      - key: PLATFORM_EMAIL
        sync: false          # Set in Render dashboard: email address to receive admin alerts
